<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Interactivo de Agujero Negro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Estilos del panel de control */
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid #444;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 250px;
        }
        #ui-panel h3 { margin: 0 0 15px 0; font-size: 16px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        
        .info { position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.6); pointer-events: none; }
        h1 { margin: 0 0 5px 0; font-size: 20px; }
    </style>
</head>
<body>

    <div class="info">
        <h1>Agujero Negro</h1>
        <p>Laboratorio Interactivo</p>
    </div>

    <div id="ui-panel">
        <h3>Parámetros Físicos</h3>
        
        <div class="control-group">
            <label><span>Masa Relativa (Gravedad)</span> <span id="massVal">1.0x</span></label>
            <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label><span>Horizonte de Sucesos</span> <span id="radiusVal">60px</span></label>
            <input type="range" id="radius" min="20" max="150" step="1" value="60">
        </div>

        <div class="control-group">
            <label><span>Densidad del Disco</span> <span id="densityVal">3000</span></label>
            <input type="range" id="density" min="100" max="10000" step="100" value="3000">
        </div>
    </div>

    <canvas id="bhCanvas"></canvas>

    <script>
        const canvas = document.getElementById('bhCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Elementos de la UI
        const massSlider = document.getElementById('mass');
        const radiusSlider = document.getElementById('radius');
        const densitySlider = document.getElementById('density');
        
        const massVal = document.getElementById('massVal');
        const radiusVal = document.getElementById('radiusVal');
        const densityVal = document.getElementById('densityVal');

        let particles = [];
        
        // Variables dinámicas
        let massMultiplier = parseFloat(massSlider.value);
        let eventHorizonRadius = parseInt(radiusSlider.value);
        let targetParticles = parseInt(densitySlider.value);

        // Función para crear una partícula nueva
        function createParticle(baseRadius) {
            const radius = baseRadius + Math.random() * 400;
            return {
                radius: radius,
                angle: Math.random() * Math.PI * 2,
                baseSpeed: 150 / Math.pow(radius, 1.5) * (Math.random() * 0.5 + 0.8),
                size: Math.random() * 2 + 0.5
            };
        }

        // Inicializar partículas
        for (let i = 0; i < targetParticles; i++) {
            particles.push(createParticle(eventHorizonRadius));
        }

        // Actualizar valores desde los sliders
        massSlider.addEventListener('input', (e) => {
            massMultiplier = parseFloat(e.target.value);
            massVal.innerText = massMultiplier.toFixed(1) + 'x';
        });

        radiusSlider.addEventListener('input', (e) => {
            eventHorizonRadius = parseInt(e.target.value);
            radiusVal.innerText = eventHorizonRadius + 'px';
        });

        densitySlider.addEventListener('input', (e) => {
            targetParticles = parseInt(e.target.value);
            densityVal.innerText = targetParticles;
        });

        function draw() {
            // Estela de movimiento
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            const centerX = width / 2;
            const centerY = height / 2;

            // Ajustar cantidad de partículas dinámicamente según el slider
            while (particles.length < targetParticles) {
                particles.push(createParticle(eventHorizonRadius));
            }
            while (particles.length > targetParticles) {
                particles.pop();
            }

            // Dibujar el disco
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // La velocidad final depende de la masa central multiplicadora
                let currentSpeed = p.baseSpeed * massMultiplier;
                p.angle += currentSpeed;

                // Si la partícula se quedó dentro del horizonte al agrandarlo, la empujamos fuera
                if (p.radius <= eventHorizonRadius) {
                    p.radius = eventHorizonRadius + Math.random() * 10;
                }

                const x = centerX + Math.cos(p.angle) * p.radius;
                const y = centerY + Math.sin(p.angle) * p.radius * 0.35; // Perspectiva

                const heat = Math.max(0, 1 - (p.radius - eventHorizonRadius) / 300);
                const r = Math.floor(255);
                const g = Math.floor(100 + heat * 155);
                const b = Math.floor(heat * 255);
                
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Dibujar el Agujero Negro
            ctx.shadowBlur = 40 + (massMultiplier * 5); // El brillo del anillo fotónico escala con la masa
            ctx.shadowColor = '#ff6600';
            ctx.fillStyle = '#000'; 
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, eventHorizonRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0; // Reset
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        draw();
    </script>
</body>
</html>
